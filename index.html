<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gestión Turística Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    
    <style>
      :root{
        --navy:#0b4970; /* azul marino */
        --turquoise:#17b6cf; /* turquesa */
        --white: #ffffff;
      }
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{height:100%;font-family:'Poppins',system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial}
      /* Full-screen background image (fish) */
      body{
        background-image: url('assets/fishes.png');
        background-size: cover;
        background-position: center top;
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-color: #03121c;
        color:var(--white);
        filter: brightness(1.15) contrast(1.1);
      }

      /* Top navigation */
      .topbar{
        background:var(--navy);
        padding:14px 28px;
        display:flex;
        align-items:center;
        justify-content:space-between;
      }
      .brand{font-weight:700;color:var(--white);font-size:20px}
      nav ul{list-style:none;margin:0;padding:0;display:flex;gap:22px;align-items:center}
      nav a{color:var(--white);text-decoration:none;font-weight:600}
      nav a:hover{opacity:0.9}

      /* Hero */
      .hero{
        min-height:calc(100vh - 56px);
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        position:relative;
        padding:40px 20px;
      }
      /* subtle dark overlay for contrast */
      .hero::before{
        content:'';
        position:absolute;inset:0;
        background:linear-gradient(to bottom, rgba(3,18,28,0.28), rgba(3,18,28,0.32));
        z-index:0;
      }
      .hero-inner{position:relative;z-index:1;max-width:980px}
      h1{font-size:64px;margin:0 0 16px;line-height:1.02;font-weight:700;letter-spacing:-1px}
      @media(max-width:800px){h1{font-size:36px}}
      p.lead{margin:0 auto 28px;color:rgba(255,255,255,0.9);font-size:18px;max-width:820px}

      .btn-primary{
        display:inline-block;padding:14px 28px;border-radius:8px;background:var(--turquoise);color:var(--navy);font-weight:700;border:none;text-decoration:none;font-size:16px;box-shadow:0 6px 18px rgba(23,182,207,0.18);
      }
      .btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(11,73,112,0.16)}

      /* Make sure no gallery controls are present; page is clean */
      .no-controls{display:none}

      /* small spacing for page content under nav */
      main{padding:0}
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Isabela Tour Center</div>
      <nav aria-label="Menú principal">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="tours.html">Tours</a></li>
          <li><a href="reservas.html">Reservas</a></li>
          <li><a href="turistas.html">Turistas</a></li>
          <li><a href="reportes.html">Reportes</a></li>
          <li><a href="contabilidad.html" id="btn-contabilidad">Contabilidad</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <h1>Gestión Turística Inteligente</h1>
          <p class="lead">Bienvenido al panel de control. Selecciona una opción del menú para comenzar a gestionar los tours del día.</p>
          <a class="btn-primary" href="reservas.html">Crear Reserva</a>
        </div>
      </section>
    </main>

    <script>
      // Gestión de sesiones seguras y persistencia de estado para la tesis.
      const usuarioRol = sessionStorage.getItem("usuarioRol");

      if (!usuarioRol) {
        window.location.href = "login.html";
      } else {
        document.addEventListener("DOMContentLoaded", () => {
          const btnContabilidad = document.getElementById("btn-contabilidad");
          if (btnContabilidad) {
            if (usuarioRol === "empleado") {
              btnContabilidad.style.display = "none";
            } else if (usuarioRol === "dueño") {
              btnContabilidad.style.display = "inline";
            }
          }
        });
      }
    </script>
  </body>
</html>
