<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Iniciar Sesión - Gestión Turística Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <style>
      :root{
        --navy:#0b4970;
        --turquoise:#17b6cf;
        --white:#ffffff;
        --text:#12364a;
      }
      *{margin:0;padding:0;box-sizing:border-box}
      body{
        min-height:100vh;
        font-family:'Poppins',system-ui,Segoe UI,Roboto,Arial,sans-serif;
        background-image:url('assets/fishes.png');
        background-size:cover;
        background-position:center top;
        background-attachment:fixed;
        background-repeat:no-repeat;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:24px;
      }
      body::before{
        content:'';
        position:fixed;
        inset:0;
        background:rgba(3,18,28,0.45);
        z-index:0;
      }
      .login-card{
        position:relative;
        z-index:1;
        width:100%;
        max-width:430px;
        background:rgba(255,255,255,0.96);
        border-radius:16px;
        box-shadow:0 18px 50px rgba(0,0,0,0.2);
        padding:34px;
      }
      .brand{color:var(--navy);font-size:22px;font-weight:700;margin-bottom:8px}
      .subtitle{color:#5d6d77;font-size:14px;margin-bottom:24px}
      .form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
      label{font-weight:600;color:var(--navy);font-size:14px}
      input{
        padding:12px 14px;
        border:1px solid #d7dde0;
        border-radius:8px;
        font-size:14px;
        color:var(--text);
      }
      input:focus{outline:none;border-color:var(--turquoise);box-shadow:0 0 0 3px rgba(23,182,207,0.16)}
      .btn-login{
        width:100%;
        padding:13px 16px;
        border:none;
        border-radius:8px;
        background:var(--turquoise);
        color:var(--navy);
        font-weight:700;
        cursor:pointer;
        margin-top:8px;
      }
      .btn-login:hover{opacity:0.95}
      .message{margin-top:14px;font-size:13px;color:#8a4b00}
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1 class="brand">Isabela Tour Center</h1>
      <p class="subtitle">Accede al panel de gestión con tu cuenta autorizada.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-login">Iniciar Sesión</button>
      </form>
      <p id="login-message" class="message"></p>
    </div>

    <script src="login.js"></script>
  </body>
</html>
